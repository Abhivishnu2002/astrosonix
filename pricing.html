<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
   <link rel="shortcut icon" href="assets/images/loader.png" type="image/x-icon">
  <title>Astrosonix</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black font-sans">



  <!-- Progress Indicator -->
  <div class="max-w-3xl mx-auto mt-8 bg-[#111111] p-4 border border-[#d4a967] rounded shadow text-gray-300 text-sm flex items-center space-x-4">
    <div class="font-medium text-white">Account</div>
    <div class="flex-1 h-px bg-[#d4a967]"></div>
    <div class="text-gray-500">Payment</div>
  </div>

  <!-- Main Checkout Card -->
  <div class="max-w-3xl mx-auto mt-6 grid grid-cols-1 lg:grid-cols-2 gap-6">

    <!-- Left Form -->
   <div class="bg-black text-white p-6 rounded-lg shadow border border-[#d4a967]">

      <!-- Billing & Account -->
      <h2 class="text-xl font-bold mb-4">Create Account & Payment</h2>
      <div class="space-y-4">
        <input type="text" placeholder="Full Name" class="w-full p-3 border rounded" />
        <input type="email" placeholder="Email" class="w-full p-3 border rounded" />
        <div class="flex items-center space-x-2">
          <input id="paypal" type="radio" name="paymethod" checked class="h-4 w-4"/>
          <label for="paypal" class="flex-1 p-3 border rounded hover:bg-[#222222] hover:text-white cursor-pointer">
            PayPal <img src="https://www.paypalobjects.com/webstatic/icon/pp258.png" class="inline h-5 ml-2"/>
          </label>
        </div>
        <div class="flex items-center space-x-2">
          <input id="card" type="radio" name="paymethod" class="h-4 w-4"/>
          <label for="card" class="flex-1 p-3 border rounded hover:bg-[#222222] hover:text-white cursor-pointer">Credit / Debit Card</label>
        </div>

        <!-- Card Inputs -->
        <div id="card-fields" class="space-y-3 mt-2 hidden">
          <input type="text" placeholder="Card Number" class="w-full p-3 border rounded" />
          <div class="grid grid-cols-2 gap-3">
            <input type="text" placeholder="MM / YY" class="p-3 border rounded" />
            <input type="text" placeholder="CVV" class="p-3 border rounded" />
          </div>
        </div>

        <!-- Submit -->
        <button class="w-full bg-[#d4a967] text-black hover:bg-[#ead4a8] text-white p-3 rounded font-semibold mt-4">
          Complete Order
        </button>
      </div>
    </div>

    <!-- Right Summary -->
    <div class="bg-black  p-6 rounded-lg shadow border border-[#d4a967] lg:sticky lg:top-20">
      <h3 class="text-lg font-bold text-white mb-4">Your Plan</h3>
      <div class="space-y-4">
        <!-- Billing Cycle Toggle -->
        <div class="flex justify-between items-center">
          <span class="font-medium text-white">Billing Cycle</span>
          <select class="border p-2 rounded">
            <option value="monthly">Monthly – ₹699</option>
            <option value="yearly">Yearly – ₹4999 (save 35%)</option>
          </select>
        </div>

        <!-- Summary Details -->
        <div class="border-t pt-4 space-y-2 text-gray-300">
          <div class="flex justify-between text-white"><span>Plan:</span><span class="font-semibold">Premium</span></div>
          <div class="flex justify-between text-white"><span>Subtotal:</span><span>₹4999</span></div>
          <div class="flex justify-between text-white"><span>Taxes:</span><span>₹450</span></div>
        </div>
        <div class="border-t pt-3 flex justify-between font-bold text-lg text-white">
          <span>Total</span><span>₹5449</span>
        </div>
      </div>
    </div>

  </div>

  <!-- JS to toggle card fields -->
  <script>
    document.getElementById('paypal').onchange = () => document.getElementById('card-fields').classList.add('hidden');
    document.getElementById('card').onchange = () => document.getElementById('card-fields').classList.remove('hidden');
  </script>
</body>
</html>
